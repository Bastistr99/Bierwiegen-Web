services:
  web:
    build: .
    image: bierwiegen-web:latest
    container_name: bierwiegen-web
    restart: unless-stopped
    ports:
      - "80:80"         # Direkter Port – bei bestehendem Reverse-Proxy (z. B. Traefik/Caddy)
                        # diesen Block ersetzen durch ein gemeinsames Docker-Network + Labels
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
